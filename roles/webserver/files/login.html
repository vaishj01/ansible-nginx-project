<!DOCTYPE html>
<html>
<head>
    <title>Wissen Store Login</title>
</head>
<body>

<center>

<h1>Wissen Store</h1>

<h3>Authentication Required</h3>

<p>Enter Temporary Password Generated by Jenkins</p>

<input type="password" id="pwd">

<br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

</center>

<script>

async function login() {

    let entered = document.getElementById("pwd").value;

    let response = await fetch("password.txt");
    let actual = (await response.text()).trim();

    if (entered === actual) {
        window.location.href = "index.html";
    }
    else {
        document.getElementById("msg").innerHTML =
        "Invalid Password";
    }
}

</script>

</body>
</html>
