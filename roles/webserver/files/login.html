<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WanderNest Login</title>

<style>
body{
    background:#f4f8fb;
    font-family:Arial,sans-serif;
}

.login-box{
    width:350px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#0077b6;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:95%;
    padding:10px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005f8f;
}

#message{
    color:red;
}
</style>

</head>

<body>

<div class="login-box">

<h1>WanderNest Travel Agency</h1>

<h3>Secure Login Portal</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

<script>

async function login(){

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    let response =
        await fetch("password.txt");

    let actualPassword =
        (await response.text()).trim();

    if(username==="admin" &&
       password===actualPassword){

        window.location.href="index.html";

    }else{

        document.getElementById("message").innerHTML =
        "Invalid Username or Password";
    }
}

</script>

</body>
</html>
