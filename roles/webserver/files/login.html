<!DOCTYPE html>

<html>
<head>
    <title>WanderNest Login</title>
</head>
<body>

<center>

```
<h1>✈️ WanderNest Travel Agency</h1>

<h3>Secure Access Portal</h3>

<p>Please enter your credentials to access the travel portal.</p>

<hr width="40%">

<input type="text"
       id="username"
       placeholder="Username">

<br><br>

<input type="password"
       id="password"
       placeholder="Password">

<br><br>

<button onclick="login()">Login</button>

<br><br>

<p id="message"></p>
```

</center>

<script>

async function login() {

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    let response =
        await fetch("password.txt");

    let actualPassword =
        (await response.text()).trim();

    if (username === "admin" &&
        password === actualPassword) {

        document.getElementById("message").innerHTML =
        "Login Successful... Redirecting";

        setTimeout(function() {

            window.location.href = "index.html";

        }, 1000);

    } else {

        document.getElementById("message").innerHTML =
        "Invalid Username or Password";

    }
}

</script>

</body>
</html>
